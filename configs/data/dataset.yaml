backend: huggingface

dataset_name: HuggingFaceFW/fineweb-edu

# Optional override if loading parquet shards directly
data_files: null

# Dataset split specification
split: train

sequence_length: 2048

shuffle_buffer_size: 100000

prefetch_batches: 8

streaming: true

sources:
  - name: web_crawl
    weight: 0.7

  - name: books
    weight: 0.2

  - name: code
    weight: 0.1
